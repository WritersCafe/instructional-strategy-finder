<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Writer's Café Strategy Finder</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f7eee9;
    color:#2d2522;
}

header{
    background:linear-gradient(135deg,#5b3f36,#b86f82,#2f6f73);
    color:white;
    padding:28px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:2rem;
}

header p{
    margin-top:8px;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:24px;
}

.filters{
    background:white;
    padding:18px;
    border-radius:18px;
    box-shadow:0 4px 14px rgba(0,0,0,.08);
    margin-bottom:24px;
}

input,select{
    padding:12px;
    margin:6px;
    border-radius:10px;
    border:1px solid #ccc;
    width:220px;
}

button{
    background:#b86f82;
    color:white;
    border:none;
    border-radius:10px;
    padding:12px 16px;
    cursor:pointer;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:18px;
    box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.card h2{
    margin-top:0;
    color:#5b3f36;
}

.tag{
    display:inline-block;
    background:#ead8d1;
    color:#3b2924;
    padding:5px 9px;
    border-radius:999px;
    font-size:12px;
    margin:3px;
}

.ecosystem{
    background:#e4f0ef;
}

.match-label{
    font-weight:bold;
    margin-bottom:10px;
    color:#2f6f73;
}

details{
    border-top:1px solid #eee;
    padding:10px 0;
}

summary{
    cursor:pointer;
    font-weight:bold;
    color:#2f6f73;
}

.script-box{
    background:#faf6f3;
    border-left:5px solid #b86f82;
    padding:12px;
    border-radius:10px;
}

.empty{
    text-align:center;
    padding:30px;
    color:#6b5a52;
}

</style>
</head>

<body>

<header>
    <h1>Writer's Café Strategy Finder</h1>
    <p>
        Search by routine, cognition, ecosystem language, or instructional need.
    </p>
</header>

<div class="container">

    <div class="filters">

        <input
            type="text"
            id="searchBox"
            placeholder="Search: thinking lab, hunt, quick check..."
            onkeyup="filterStrategies()"
        />

        <select id="playlistFilter" onchange="filterStrategies()">
            <option value="all">All Playlists</option>
            <option value="movement">Movement & Discourse</option>
            <option value="practice">Rehearsal & Practice</option>
            <option value="thinking">Extending Thinking</option>
            <option value="mistakes">Learning From Mistakes</option>
            <option value="evidence">Evidence Of Learning</option>
        </select>

        <select id="thinkingFilter" onchange="filterStrategies()">
            <option value="all">All Thinking Needs</option>
            <option value="discussion">Discussion</option>
            <option value="inference">Inference</option>
            <option value="summary">Summary</option>
            <option value="review">Review</option>
            <option value="evidence">Evidence</option>
            <option value="error-analysis">Error Analysis</option>
            <option value="synthesis">Synthesis</option>
        </select>

        <button onclick="resetFilters()">Reset</button>

    </div>

    <div id="strategyContainer"></div>

</div>

<script>

    ],

    secondaryRoutines:[
        "thinking lab",

    matchStrength:{
        "thinking lab":9,

    ],

        "hunt":4,

    purpose:

    bestUse:

        "Position signs and prompts.",

];

function getMatchLabel(score){

    if(score >= 9){
        return "🟢 BEST MATCH";
    }

    else if(score >= 6){
        return "🟡 STRONG MATCH";
    }

    else if(score >= 3){
        return "⚪ SUPPORTIVE MATCH";
    }

    else{
        return "";
    }
}

function formatPlaylist(code){

    const names = {
        movement:"Movement & Discourse",
        practice:"Rehearsal & Practice",
        thinking:"Extending Thinking",
        mistakes:"Learning From Mistakes",
        evidence:"Evidence Of Learning"
    };

    return names[code] || code;
}

function displayStrategies(list, searchTerm=""){

    const container =
        document.getElementById("strategyContainer");

    container.innerHTML = "";

    if(list.length === 0){

        container.innerHTML = `
            <div class="empty">
                No strategies found.
            </div>
        `;

        return;
    }

    list.forEach(strategy => {

        let score = 0;

        if(
            strategy.matchStrength &&
            strategy.matchStrength[searchTerm]
        ){
            score = strategy.matchStrength[searchTerm];
        }

        const matchLabel =
            getMatchLabel(score);

        const card =
            document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <h2>${strategy.title}</h2>

            ${
                matchLabel
                ?
                `<div class="match-label">
                    ${matchLabel} for "${searchTerm}"
                </div>`
                :
                ""
            }

            <span class="tag">
                ${formatPlaylist(strategy.playlist)}
            </span>

            <span class="tag">
                ${strategy.time}
            </span>

            <span class="tag">
                ${strategy.energy} Energy
            </span>

            <span class="tag">
                ${strategy.teacherLoad}
            </span>

            ${
                strategy.ecosystemTags.map(tag => `
                    <span class="tag ecosystem">
                        ${tag}
                    </span>
                `).join("")
            }

            <details open>
                <summary>Purpose</summary>
                <p>${strategy.purpose}</p>
            </details>

            <details>
                <summary>Best Used When</summary>
                <p>${strategy.bestUse}</p>
            </details>

            <details>
                <summary>Step-by-Step Instructions</summary>
                <ol>
                    ${
                        strategy.steps.map(step => `
                            <li>${step}</li>
                        `).join("")
                    }
                </ol>
            </details>

            <details>
                <summary>Differentiation</summary>
                <p>${strategy.differentiation}</p>
            </details>

            <details>
                <summary>Materials</summary>
                <p>${strategy.materials}</p>
            </details>

            <details>
                <summary>Learning Ecosystem Fit</summary>
                <p>${strategy.ecosystem}</p>
            </details>

            <details>
                <summary>Pairs Well With</summary>
                <p>${strategy.pairsWell}</p>
            </details>

            <details>
                <summary>Watch Outs</summary>
                <p>${strategy.watchOut}</p>
            </details>

            <details>
                <summary>Classroom Example Script</summary>

                <div class="script-box">

                    <p>
                        <strong>Teacher Move:</strong>
                        ${strategy.script.teacher}
                    </p>

                    <p>
                        <strong>Possible Student Response:</strong>
                        ${strategy.script.student}
                    </p>

                    <p>
                        <strong>Teacher Follow-Up:</strong>
                        ${strategy.script.followup}
                    </p>

                </div>

            </details>

            <details>
                <summary>Exit Ticket Idea</summary>
                <p>${strategy.exitTicket}</p>
            </details>

        `;

        container.appendChild(card);

    });

}

function filterStrategies(){

    const search =
        document.getElementById("searchBox")
        .value
        .toLowerCase()
        .trim();

    const playlist =
        document.getElementById("playlistFilter")
        .value;

    const thinking =
        document.getElementById("thinkingFilter")
        .value;

    let filtered = strategies.filter(strategy => {

        const searchableText = `
            ${strategy.title}
            ${strategy.playlist}
            ${strategy.thinking.join(" ")}
            ${strategy.ecosystemTags.join(" ")}
            ${strategy.primaryRoutine}
            ${strategy.secondaryRoutines.join(" ")}
            ${strategy.purpose}
            ${strategy.bestUse}
        `.toLowerCase();

        const matchesSearch =
            searchableText.includes(search);

        const matchesPlaylist =
            playlist === "all" ||
            strategy.playlist === playlist;

        const matchesThinking =
            thinking === "all" ||
            strategy.thinking.includes(thinking);

        return (
            matchesSearch &&
            matchesPlaylist &&
            matchesThinking
        );

    });

    filtered.sort((a,b) => {

        const scoreA =
            a.matchStrength &&
            a.matchStrength[search]
            ? a.matchStrength[search]
            : 0;

        const scoreB =
            b.matchStrength &&
            b.matchStrength[search]
            ? b.matchStrength[search]
            : 0;

        return scoreB - scoreA;

    });

    displayStrategies(filtered, search);

}

function resetFilters(){

    document.getElementById("searchBox").value = "";

    document.getElementById("playlistFilter").value = "all";

    document.getElementById("thinkingFilter").value = "all";

    displayStrategies(strategies);

}

displayStrategies(strategies);

</script>

</body>
</html>
